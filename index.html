<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ilhan's Ph.D. and Postdoc fav photos</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
  }

  h2 {
    margin: 10px 0;
  }

  .carousel {
    position: relative;
    max-width: 100%;
    margin: auto;
    padding: 10px;
  }

  #media-container {
    width: 100%;
  }

  img, video {
    width: 100%;
    max-height: 70vh;
    object-fit: contain;
    border-radius: 10px;
  }

  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 30px;
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
  }

  .left { left: 10px; }
  .right { right: 10px; }

  .counter {
    margin-top: 8px;
    font-size: 16px;
    opacity: 0.8;
  }

  @media (min-width: 768px) {
    .carousel {
      max-width: 900px;
    }
  }
</style>
</head>

<body>

<h2>Ilhan's Ph.D. and Postdoc fav photos</h2>

<div class="carousel" id="carousel">
  <button class="arrow left" onclick="prev()">&#8592;</button>

  <div id="media-container"></div>

  <button class="arrow right" onclick="next()">&#8594;</button>
</div>

<div class="counter" id="counter"></div>

"pics/Frame-16-01-2025-07-45-19.png"
];

let index = 0;
const container = document.getElementById("media-container");
const counter = document.getElementById("counter");

function showMedia() {
  const file = files[index];
  container.innerHTML = "";

  if (file.endsWith(".mp4")) {
    const video = document.createElement("video");
    video.src = file;
    video.controls = true;
    video.autoplay = true;
    container.appendChild(video);
  } else {
    const img = document.createElement("img");
    img.src = file;
    container.appendChild(img);
  }

  counter.textContent = `${index + 1} / ${files.length}`;
}

function next() {
  index = (index + 1) % files.length;
  showMedia();
}

function prev() {
  index = (index - 1 + files.length) % files.length;
  showMedia();
}

// Swipe support
let startX = 0;

document.getElementById("carousel").addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.getElementById("carousel").addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (endX - startX > 50) prev();
  if (startX - endX > 50) next();
});

// Keyboard support
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

// Init
showMedia();
</script>
