<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Carousel</title>

<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  .carousel {
    position: relative;
    max-width: 900px;
    margin: 40px auto;
  }

  img, video {
    width: 100%;
    max-height: 600px;
    object-fit: contain;
    border-radius: 10px;
  }

  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    cursor: pointer;
    padding: 10px;
    border-radius: 50%;
  }

  .left { left: -60px; }
  .right { right: -60px; }
</style>
</head>

<body>

<h2>Media Carousel</h2>

<div class="carousel">
  <button class="arrow left" onclick="prev()">&#8592;</button>

  <div id="media-container"></div>

  <button class="arrow right" onclick="next()">&#8594;</button>
</div>

let index = 0;
const container = document.getElementById("media-container");

function showMedia() {
  const file = files[index];

  // Clear previous
  container.innerHTML = "";

  if (file.endsWith(".mp4")) {
    const video = document.createElement("video");
    video.src = file;
    video.controls = true;
    video.autoplay = true;
    container.appendChild(video);
  } else {
    const img = document.createElement("img");
    img.src = file;
    container.appendChild(img);
  }
}

function next() {
  index = (index + 1) % files.length;
  showMedia();
}

function prev() {
  index = (index - 1 + files.length) % files.length;
  showMedia();
}

// Init
showMedia();
